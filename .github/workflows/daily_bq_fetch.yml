name: Daily BigQuery Refresh (5 AM IST)

on:
  schedule:
    # 5 AM IST = 23:30 UTC (previous day)
    - cron: '30 23 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub Actions tab

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --quiet google-cloud-bigquery pandas pyarrow shapely pytz

      - name: Write service account key
        env:
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
        run: |
          echo "$BQ_SERVICE_ACCOUNT_JSON" > /tmp/sa_key.json

      - name: Fetch data from BigQuery
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/sa_key.json
        run: python scripts/daily_fetch.py

      - name: Commit updated data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: daily BQ refresh $(date -u +'%Y-%m-%d')"
          git push
